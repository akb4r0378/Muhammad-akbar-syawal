<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 7 Test - Task Rendering and Event Listeners</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 3px;
        }
        .pass {
            background-color: #d4edda;
            color: #155724;
        }
        .fail {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>Task 7 Test - Task Rendering and Event Listeners</h1>
    
    <div class="test-section">
        <h2>Task List Component</h2>
        <div class="task-input-container">
            <input type="text" id="task-input" placeholder="Add a new task...">
            <button id="add-task-btn">Add</button>
        </div>
        <ul id="task-list"></ul>
    </div>

    <div class="test-section">
        <h2>Test Results</h2>
        <div id="test-results"></div>
    </div>

    <script src="js/app.js"></script>
    
    <script>
        // Test suite for Task 7
        const testResults = [];
        
        function addTestResult(name, passed, message) {
            testResults.push({ name, passed, message });
            const resultsDiv = document.getElementById('test-results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `test-result ${passed ? 'pass' : 'fail'}`;
            resultDiv.innerHTML = `<strong>${passed ? '✓' : '✗'} ${name}</strong><br>${message}`;
            resultsDiv.appendChild(resultDiv);
        }
        
        // Wait for initialization
        setTimeout(() => {
            console.log('Starting Task 7 tests...');
            
            // Clear any existing tasks
            tasks = [];
            saveTasks();
            renderTasks();
            
            // Test 7.1.1: renderTasks() function exists
            try {
                if (typeof renderTasks === 'function') {
                    addTestResult('7.1.1 renderTasks() exists', true, 'Function is defined');
                } else {
                    addTestResult('7.1.1 renderTasks() exists', false, 'Function not found');
                }
            } catch (e) {
                addTestResult('7.1.1 renderTasks() exists', false, e.message);
            }
            
            // Test 7.1.2: createTaskElement() function exists
            try {
                if (typeof createTaskElement === 'function') {
                    addTestResult('7.1.2 createTaskElement() exists', true, 'Function is defined');
                } else {
                    addTestResult('7.1.2 createTaskElement() exists', false, 'Function not found');
                }
            } catch (e) {
                addTestResult('7.1.2 createTaskElement() exists', false, e.message);
            }
            
            // Test 7.1.3: Tasks display in creation order
            try {
                addTask('First task');
                addTask('Second task');
                addTask('Third task');
                renderTasks();
                
                const taskElements = document.querySelectorAll('.task-item .task-text');
                const passed = taskElements.length === 3 &&
                              taskElements[0].textContent === 'First task' &&
                              taskElements[1].textContent === 'Second task' &&
                              taskElements[2].textContent === 'Third task';
                
                addTestResult('7.1.3 Tasks display in creation order', passed, 
                    passed ? 'Tasks are displayed in the correct order' : 'Task order is incorrect');
            } catch (e) {
                addTestResult('7.1.3 Tasks display in creation order', false, e.message);
            }
            
            // Test 7.1.4: Visual styling for completed tasks
            try {
                const firstTaskId = tasks[0].id;
                toggleTask(firstTaskId);
                renderTasks();
                
                const firstTaskElement = document.querySelector('.task-item');
                const hasCompletedClass = firstTaskElement.classList.contains('completed');
                
                addTestResult('7.1.4 Visual styling for completed tasks', hasCompletedClass,
                    hasCompletedClass ? 'Completed class is applied' : 'Completed class not found');
            } catch (e) {
                addTestResult('7.1.4 Visual styling for completed tasks', false, e.message);
            }
            
            // Test 7.2.1: Add task button handler
            try {
                const taskInput = document.getElementById('task-input');
                const addTaskBtn = document.getElementById('add-task-btn');
                
                const initialCount = tasks.length;
                taskInput.value = 'Test button task';
                addTaskBtn.click();
                
                const passed = tasks.length === initialCount + 1 &&
                              tasks[tasks.length - 1].text === 'Test button task';
                
                addTestResult('7.2.1 Add task button handler', passed,
                    passed ? 'Button click adds task correctly' : 'Button handler not working');
            } catch (e) {
                addTestResult('7.2.1 Add task button handler', false, e.message);
            }
            
            // Test 7.2.2: Enter key handler
            try {
                const taskInput = document.getElementById('task-input');
                const initialCount = tasks.length;
                
                taskInput.value = 'Test enter key task';
                const enterEvent = new KeyboardEvent('keypress', { key: 'Enter' });
                taskInput.dispatchEvent(enterEvent);
                
                const passed = tasks.length === initialCount + 1 &&
                              tasks[tasks.length - 1].text === 'Test enter key task';
                
                addTestResult('7.2.2 Enter key handler', passed,
                    passed ? 'Enter key adds task correctly' : 'Enter key handler not working');
            } catch (e) {
                addTestResult('7.2.2 Enter key handler', false, e.message);
            }
            
            // Test 7.2.3: Complete button handler
            try {
                const taskId = tasks[tasks.length - 1].id;
                const initialCompleted = tasks[tasks.length - 1].completed;
                
                const completeBtn = document.querySelector('.task-item:last-child .complete-btn');
                completeBtn.click();
                
                const task = tasks.find(t => t.id === taskId);
                const passed = task.completed !== initialCompleted;
                
                addTestResult('7.2.3 Complete button handler', passed,
                    passed ? 'Complete button toggles status' : 'Complete button not working');
            } catch (e) {
                addTestResult('7.2.3 Complete button handler', false, e.message);
            }
            
            // Test 7.2.4: Edit button handler
            try {
                const editBtn = document.querySelector('.task-item:last-child .edit-btn');
                editBtn.click();
                
                const editInput = document.querySelector('.task-edit-input');
                const passed = editInput !== null;
                
                addTestResult('7.2.4 Edit button handler', passed,
                    passed ? 'Edit button creates input field' : 'Edit button not working');
            } catch (e) {
                addTestResult('7.2.4 Edit button handler', false, e.message);
            }
            
            // Test 7.2.5: Delete button handler
            try {
                const initialCount = tasks.length;
                const deleteBtn = document.querySelector('.task-item:first-child .delete-btn');
                deleteBtn.click();
                
                const passed = tasks.length === initialCount - 1;
                
                addTestResult('7.2.5 Delete button handler', passed,
                    passed ? 'Delete button removes task' : 'Delete button not working');
            } catch (e) {
                addTestResult('7.2.5 Delete button handler', false, e.message);
            }
            
            // Test 7.2.6: loadTasks() called during initialization
            try {
                // This test checks if tasks are loaded from localStorage on init
                // We'll save some tasks and reload the page simulation
                const testTasks = [
                    { id: 'test1', text: 'Saved task 1', completed: false, createdAt: Date.now() },
                    { id: 'test2', text: 'Saved task 2', completed: true, createdAt: Date.now() }
                ];
                localStorage.setItem('tasks', JSON.stringify(testTasks));
                
                loadTasks();
                const passed = tasks.length === 2 &&
                              tasks[0].text === 'Saved task 1' &&
                              tasks[1].text === 'Saved task 2';
                
                addTestResult('7.2.6 loadTasks() during initialization', passed,
                    passed ? 'Tasks loaded from localStorage' : 'Tasks not loaded correctly');
            } catch (e) {
                addTestResult('7.2.6 loadTasks() during initialization', false, e.message);
            }
            
            // Summary
            const totalTests = testResults.length;
            const passedTests = testResults.filter(r => r.passed).length;
            const summaryDiv = document.createElement('div');
            summaryDiv.className = `test-result ${passedTests === totalTests ? 'pass' : 'fail'}`;
            summaryDiv.innerHTML = `<strong>Summary: ${passedTests}/${totalTests} tests passed</strong>`;
            document.getElementById('test-results').appendChild(summaryDiv);
            
            console.log('Task 7 tests complete!');
            console.log(`${passedTests}/${totalTests} tests passed`);
        }, 200);
    </script>
</body>
</html>
