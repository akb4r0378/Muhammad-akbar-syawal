<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Theme Toggle</title>
    <style>
        body {
            padding: 20px;
            font-family: Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        body[data-theme="light"] {
            background-color: #ffffff;
            color: #333333;
        }
        body[data-theme="dark"] {
            background-color: #1a1a1a;
            color: #f0f0f0;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 2px solid currentColor;
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Theme Toggle Test</h1>
    
    <div class="test-section">
        <h2>Manual Tests</h2>
        <button id="theme-toggle">Toggle Theme</button>
        <button onclick="checkTheme()">Check Current Theme</button>
        <button onclick="checkLocalStorage()">Check localStorage</button>
        <button onclick="clearStorage()">Clear localStorage</button>
        <div id="output" style="margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.1);"></div>
    </div>

    <div class="test-section">
        <h2>Automated Tests</h2>
        <button onclick="runTests()">Run All Tests</button>
        <div id="test-results" style="margin-top: 10px;"></div>
    </div>

    <script>
        // Theme state
        let currentTheme = 'light';

        function loadTheme() {
            try {
                const storedTheme = localStorage.getItem('theme');
                if (storedTheme === 'light' || storedTheme === 'dark') {
                    currentTheme = storedTheme;
                } else {
                    currentTheme = 'light';
                }
            } catch (e) {
                console.error('Failed to load theme from localStorage:', e);
                currentTheme = 'light';
            }
            applyTheme(currentTheme);
        }

        function saveTheme() {
            try {
                localStorage.setItem('theme', currentTheme);
            } catch (e) {
                console.error('Failed to save theme to localStorage:', e);
            }
        }

        function applyTheme(theme) {
            document.body.setAttribute('data-theme', theme);
        }

        function toggleTheme() {
            currentTheme = (currentTheme === 'light') ? 'dark' : 'light';
            applyTheme(currentTheme);
            saveTheme();
        }

        // Test helper functions
        function checkTheme() {
            const output = document.getElementById('output');
            output.innerHTML = `
                <strong>Current Theme:</strong> ${currentTheme}<br>
                <strong>Body data-theme:</strong> ${document.body.getAttribute('data-theme')}
            `;
        }

        function checkLocalStorage() {
            const output = document.getElementById('output');
            const stored = localStorage.getItem('theme');
            output.innerHTML = `<strong>localStorage['theme']:</strong> ${stored || 'null'}`;
        }

        function clearStorage() {
            localStorage.removeItem('theme');
            const output = document.getElementById('output');
            output.innerHTML = '<strong>localStorage cleared!</strong>';
        }

        // Automated tests
        function runTests() {
            const results = document.getElementById('test-results');
            results.innerHTML = '<h3>Running tests...</h3>';
            
            const tests = [];
            
            // Test 1: Default theme is light
            localStorage.removeItem('theme');
            currentTheme = 'light';
            loadTheme();
            tests.push({
                name: 'Default theme is light',
                pass: currentTheme === 'light' && document.body.getAttribute('data-theme') === 'light'
            });
            
            // Test 2: Toggle from light to dark
            currentTheme = 'light';
            applyTheme(currentTheme);
            toggleTheme();
            tests.push({
                name: 'Toggle from light to dark',
                pass: currentTheme === 'dark' && document.body.getAttribute('data-theme') === 'dark'
            });
            
            // Test 3: Toggle from dark to light
            toggleTheme();
            tests.push({
                name: 'Toggle from dark to light',
                pass: currentTheme === 'light' && document.body.getAttribute('data-theme') === 'light'
            });
            
            // Test 4: Theme persists to localStorage
            currentTheme = 'dark';
            saveTheme();
            const stored = localStorage.getItem('theme');
            tests.push({
                name: 'Theme persists to localStorage',
                pass: stored === 'dark'
            });
            
            // Test 5: Theme loads from localStorage
            localStorage.setItem('theme', 'dark');
            currentTheme = 'light'; // Reset to different value
            loadTheme();
            tests.push({
                name: 'Theme loads from localStorage',
                pass: currentTheme === 'dark' && document.body.getAttribute('data-theme') === 'dark'
            });
            
            // Test 6: Invalid theme defaults to light
            localStorage.setItem('theme', 'invalid');
            loadTheme();
            tests.push({
                name: 'Invalid theme defaults to light',
                pass: currentTheme === 'light'
            });
            
            // Test 7: localStorage errors handled gracefully
            const originalSetItem = Storage.prototype.setItem;
            Storage.prototype.setItem = function() { throw new Error('Mock error'); };
            currentTheme = 'dark';
            saveTheme(); // Should not throw
            Storage.prototype.setItem = originalSetItem;
            tests.push({
                name: 'localStorage errors handled gracefully',
                pass: true // If we got here, no error was thrown
            });
            
            // Display results
            let html = '<h3>Test Results:</h3>';
            let passed = 0;
            tests.forEach(test => {
                const status = test.pass ? '✅ PASS' : '❌ FAIL';
                html += `<div>${status}: ${test.name}</div>`;
                if (test.pass) passed++;
            });
            html += `<div style="margin-top: 10px; font-weight: bold;">Total: ${passed}/${tests.length} tests passed</div>`;
            results.innerHTML = html;
            
            // Restore to light theme
            currentTheme = 'light';
            applyTheme(currentTheme);
            saveTheme();
        }

        // Initialize
        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
        loadTheme();
    </script>
</body>
</html>
